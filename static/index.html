<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐌 史莱姆牧场 存档修改器</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system,"Segoe UI","Microsoft YaHei",sans-serif;
    max-width:1000px; margin:0 auto; padding:16px; background:#f5f5f7; color:#222; }
  h1 { font-size:22px; text-align:center; }
  h2 { font-size:17px; border-left:4px solid #4a90d9; padding-left:8px; margin-top:24px; }
  .card { background:#fff; border-radius:10px; padding:16px; margin-bottom:16px;
    box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .hidden { display:none; }
  button { background:#4a90d9; color:#fff; border:none; border-radius:6px;
    padding:7px 14px; cursor:pointer; font-size:14px; }
  button:hover { background:#357abd; }
  button.gray { background:#888; }
  button.green { background:#2ecc71; }
  button.danger { background:#e74c3c; }
  input, select { padding:6px 8px; border:1px solid #ccc; border-radius:6px; font-size:14px; }
  input[type=number] { width:110px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { padding:6px 8px; border-bottom:1px solid #eee; text-align:left; }
  th { background:#fafafa; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .muted { color:#888; font-size:13px; }
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:6px; }
  .stat-item { background:#f0f4f8; border-radius:6px; padding:6px 10px; font-size:13px; }
  #log { background:#1e1e1e; color:#b5e853; font-family:monospace; font-size:12px;
    height:160px; overflow-y:auto; padding:8px; border-radius:6px; white-space:pre-wrap; }
  .big-count { color:#e67e22; font-weight:bold; }
</style>
</head>
<body>

<h1>🐌 史莱姆牧场1 存档修改器</h1>

<div class="card">
  <h2>📁 存档文件</h2>
  <div class="row">
    <input type="file" id="fileInput">
    <button onclick="doUpload()">上传解析</button>
    <button class="green hidden" id="dlBtn" onclick="doDownload()">💾 下载修改后存档</button>
  </div>
  <div id="overview" class="muted" style="margin-top:10px;"></div>
</div>

<div id="main" class="hidden">
  <div class="card">
    <h2>📦 仓库物品 <button class="gray" onclick="loadItems()" style="font-size:12px;padding:3px 8px;">🔄刷新</button></h2>
    <div class="muted">同种物品多堆叠分行显示, 对照游戏内自行选择修改。橙色=异常大数值。</div>
    <table id="itemTable">
      <thead><tr><th>itemId</th><th>名称</th><th>当前数量</th><th>新数量</th><th>操作</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>🐾 史莱姆种类转换</h2>
    <div class="muted">仅普通+特殊史莱姆可互转 (已排除焦油/鸡/果实/大史莱姆/Gordo)。⚠️=行为可能异常</div>
    <div class="row" style="margin:10px 0;">
      从 <select id="fromSel"></select>
      → <select id="toSel"></select>
      <button class="danger" onclick="doConvert()">执行转换</button>
    </div>
    <h3 style="font-size:14px;">当前牧场实体统计 (含果实/箱子, ★=可转换)</h3>
    <div class="stat-grid" id="slimeStats"></div>
  </div>

  <div class="card">
    <h2>💰 市场饱和度 <span class="muted" id="marketAddr"></span></h2>
    <div class="muted">饱和度=累积销量, 越高价越低。清零=拉满所有售价。</div>
    <div class="row" style="margin:10px 0;">
      <button class="green" onclick="doMarketClear()">💎 全部清零(拉满价格)</button>
    </div>
    <table id="marketTable">
      <thead><tr><th>itemId</th><th>结晶名称</th><th>当前饱和度</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="card">
  <h2>📋 操作日志</h2>
  <div id="log"></div>
</div>

<script>
let FID=null;
function log(msg,type="info"){
  const t=new Date().toLocaleTimeString();
  const icon={info:"ℹ️",ok:"✅",warn:"⚠️",err:"❌"}[type]||"•";
  const el=document.getElementById("log");
  el.textContent+=`[${t}] ${icon} ${msg}\n`; el.scrollTop=el.scrollHeight;
}
async function api(url,opts){ const r=await fetch(url,opts); return await r.json(); }

async function doUpload(){
  const f=document.getElementById("fileInput").files[0];
  if(!f){ alert("请先选择文件"); return; }
  const fd=new FormData(); fd.append("file",f);
  log("上传中...");
  const j=await api("/api/upload",{method:"POST",body:fd});
  if(!j.ok){ log(j.msg,"err"); alert(j.msg); return; }
  FID=j.fileId; showOverview(j.overview);
  document.getElementById("main").classList.remove("hidden");
  document.getElementById("dlBtn").classList.remove("hidden");
  log(`上传成功, ID=${FID.slice(0,8)}`,"ok");
  await loadConvertible(); await loadItems(); await loadSlimes(); await loadMarket();
}
function showOverview(o){
  document.getElementById("overview").innerHTML=
    `文件大小: <b>${o.fileSize}</b> 字节 | SRAD: <b>${o.sradTotal}</b> `+
    `(实体${o.complexCount}/物品${o.simpleCount}) | 市场: `+
    (o.marketOk?`<b>${o.marketAddr}</b> ${o.marketItems}项 ✅`:"<b style='color:red'>未定位❌</b>");
}

function renderItems(items){
  const tb=document.querySelector("#itemTable tbody"); tb.innerHTML="";
  items.forEach(it=>{
    const tr=document.createElement("tr");
    const big=it.count>=100000?"big-count":"";
    tr.innerHTML=`<td>${it.itemId}</td><td>${it.name}</td>`+
      `<td class="${big}">${it.count}</td>`+
      `<td><input type="number" value="${it.count}" min="0" max="9999999"></td>`+
      `<td><button>改</button></td>`;
    const inp=tr.querySelector("input");
    tr.querySelector("button").onclick=()=>doEditItem(it.addr,inp.value);
    tb.appendChild(tr);
  });
}
async function loadItems(){
  const j=await api(`/api/items/${FID}`);
  if(!j.ok){ log(j.msg,"err"); return; }
  renderItems(j.items); log(`物品列表已刷新 (${j.items.length}项)`,"ok");
}
async function doEditItem(addr,count){
  const j=await api("/api/edit/item",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fileId:FID,addr:addr,count:Number(count)})});
  if(!j.ok){ log(j.msg,"err"); alert(j.msg); return; }
  log(`物品修改: addr=${addr} → ${j.value}`,"ok");
  if(j.items) renderItems(j.items);
}

async function loadConvertible(){
  const j=await api("/api/convertible");
  const fs=document.getElementById("fromSel"), ts=document.getElementById("toSel");
  fs.innerHTML=""; ts.innerHTML="";
  j.list.forEach(s=>{
    const label=(s.warn?"⚠️ ":"")+`${s.name} (${s.itemId})`;
    fs.add(new Option(label,s.itemId)); ts.add(new Option(label,s.itemId));
  });
}
function renderSlimes(slimes){
  const box=document.getElementById("slimeStats"); box.innerHTML="";
  slimes.forEach(s=>{
    const div=document.createElement("div"); div.className="stat-item";
    div.textContent=`${s.name} ×${s.count}${s.convertible?" ★":""}`;
    box.appendChild(div);
  });
}
async function loadSlimes(){
  const j=await api(`/api/slimes/${FID}`);
  if(!j.ok){ log(j.msg,"err"); return; }
  renderSlimes(j.slimes);
}
async function doConvert(){
  const fe=document.getElementById("fromSel"), te=document.getElementById("toSel");
  const from=Number(fe.value), to=Number(te.value);
  if(from===to){ alert("起始和目标相同"); return; }
  const fn=fe.options[fe.selectedIndex].text, tn=te.options[te.selectedIndex].text;
  const warn=tn.includes("⚠️")?"\n⚠️ 目标种类行为可能异常(如黄金逃跑)。":"";
  if(!confirm(`确认把所有【${fn}】转换成【${tn}】？${warn}\n建议先备份。`)) return;
  const j=await api("/api/edit/slime",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fileId:FID,from:from,to:to})});
  if(!j.ok){ log(j.msg,"err"); alert(j.msg); return; }
  log(j.msg,"ok"); if(j.slimes) renderSlimes(j.slimes);
}

function renderMarket(market){
  const tb=document.querySelector("#marketTable tbody"); tb.innerHTML="";
  market.forEach(m=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${m.itemId}</td><td>${m.name}</td><td>${m.saturation}</td>`;
    tb.appendChild(tr);
  });
}
async function loadMarket(){
  const j=await api(`/api/market/${FID}`);
  if(!j.ok){ log(j.msg,"err"); return; }
  document.getElementById("marketAddr").textContent=j.addr?`(定位 ${j.addr})`:"(未定位)";
  renderMarket(j.market);
}
async function doMarketClear(){
  if(!confirm("确认清零所有市场饱和度(拉满售价)？")) return;
  const j=await api("/api/edit/market",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fileId:FID})});
  if(!j.ok){ log(j.msg,"err"); alert(j.msg); return; }
  log(j.msg,"ok"); if(j.market) renderMarket(j.market);
}

function doDownload(){
  if(!FID) return;
  log("下载修改后存档...","ok");
  window.location=`/api/download/${FID}`;
}
</script>
</body>
</html>
