name: 🐳 手动构建并推送镜像

# 纯手动触发：只在 Actions 页面点 "Run workflow" 才执行
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (默认 latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  # 镜像名 = ghcr.io/你的用户名/仓库名 (自动取，全小写)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # 推 ghcr 必须

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 转小写镜像名
        id: meta
        run: echo "image=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.event.inputs.tag }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出结果
        run: |
          echo "✅ 推送完成"
          echo "镜像: ${{ steps.meta.outputs.image }}:${{ github.event.inputs.tag }}"
          echo "拉取: docker pull ${{ steps.meta.outputs.image }}:${{ github.event.inputs.tag }}"
